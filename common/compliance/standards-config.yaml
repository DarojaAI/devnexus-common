# Standards Compliance Configuration
# Defines which standards apply to which repository types and enforcement levels

version: "1.0.0"
last_updated: "2026-02-24"

# =============================================================================
# Readiness Stages
# =============================================================================
# Defines the stages a repository goes through from idea to production.
# Each stage has a configurable label and a list of compliance checks that
# must pass to be considered "at that stage".
#
# Stages are evaluated in order. A repo is at the highest stage where ALL
# checks in that stage pass. Stage names are configurable; the check IDs
# reference the standards above.
#
# To customize stage names, edit the "label" field. To change which checks
# define a stage, edit the "requires" list.
# =============================================================================

readiness_stages:
  - stage: 0
    label: "Has Idea"
    requires: []
    description: "Repository exists (even if empty or just README)"

  - stage: 1
    label: "Has Code"
    requires:
      - "repository_has_source_files"
    description: "Actual source files have been committed"

  - stage: 2
    label: "Has Structure"
    requires:
      - "has_claude_md"
      - "has_gitignore"
    description: "Proper project layout with documentation and ignore rules"

  - stage: 3
    label: "Has CI"
    requires:
      - "ci_cd_pipeline"
    description: "GitHub Actions workflow present and functional"

  - stage: 4
    label: "Has Tests"
    requires:
      - "has_test_files"
      - "tests_pass_in_ci"
    description: "Automated tests exist and pass in CI"

  - stage: 5
    label: "Has Deployment"
    requires:
      - "is_deployed"
    description: "Deployed to an environment (Cloud Run, GCS, etc.)"

# =============================================================================
# Testing Readiness Stages (assess_testing_readiness skill)
# =============================================================================

testing_readiness_stages:
  - stage: 0
    label: "No Automated Tests"
    layers: []
    description: "No automated testing found in the repository"

  - stage: 1
    label: "Unit Tests Only"
    layers: ["unit"]
    description: "Basic unit tests present (functions/classes in isolation)"

  - stage: 2
    label: "Unit + Integration"
    layers: ["unit", "integration"]
    description: "Unit tests plus integration tests for component interaction"

  - stage: 3
    label: "Unit + Integration + API"
    layers: ["unit", "integration", "api"]
    description: "Full functional testing of endpoints and business logic"

  - stage: 4
    label: "Has CI + Core Coverage"
    layers: ["unit", "integration", "api"]
    requires_ci: true
    description: "Core tests run automatically on every PR and push"

  - stage: 5
    label: "Full Testing Pyramid"
    layers: ["unit", "integration", "api", "e2e"]
    description: "Unit, integration, API, plus end-to-end browser tests"

  - stage: 6
    label: "Production Ready"
    layers: ["unit", "integration", "api", "e2e", "performance", "security"]
    description: "Full testing pyramid with performance benchmarks and security scans"

# =============================================================================
# Check Definitions (used by readiness_stages above)
# =============================================================================

readiness_checks:
  repository_has_source_files:
    description: "Repository has source files beyond just README/config"
    check_type: "file_pattern"
    pattern: "**/*.{py,ts,js,go,java,rs,rb,php,cpp,c,h}"
    excludes: ["*.min.js", "*.bundle.js", "node_modules/", "vendor/"]

  has_claude_md:
    description: "CLAUDE.md exists in repository root"
    check_type: "file_exists"
    path: "CLAUDE.md"

  has_gitignore:
    description: ".gitignore exists and excludes common patterns"
    check_type: "file_contains"
    path: ".gitignore"
    pattern: "node_modules|.terraform"

  has_test_files:
    description: "Test files exist in repository"
    check_type: "file_pattern"
    pattern: "**/test*.py|**/*_test.go|**/*.test.ts|**/tests/*.js|pytest.ini|tox.ini|jest.config.*|pyproject.toml"

  tests_pass_in_ci:
    description: "CI workflow runs tests and reports success"
    check_type: "ci_status"
    workflow: ".github/workflows/ci.yml"
    required_status: "success"

  is_deployed:
    description: "Repository has been deployed to an environment"
    check_type: "deployment_exists"
    # Check for: Cloud Run service, GCS bucket, or GitHub deployment

# =============================================================================

# Standard definitions
standards:
  api_documentation_automation:
    id: "api_docs_automation"
    title: "API Documentation Automation"
    description: "Automated generation of API specifications, manifests, and changelogs from code"
    applies_to: ["backend"]
    level: "required"  # required, recommended, optional
    documentation: "https://github.com/DarojaAI/dev-nexus/blob/main/docs/API_DOCUMENTATION_SETUP_CHECKLIST.md"
    files:
      - path: "a2a/skill_metadata.py"
        required: true
        description: "Decorator system for marking breaking changes"
      - path: "scripts/generate_skills_manifest.py"
        required: true
        description: "Generates a2a-skills.json manifest"
      - path: "scripts/generate_changelog.py"
        required: true
        description: "Generates CHANGELOG.md and BREAKING_CHANGES.md"
      - path: "scripts/schema_differ.py"
        required: true
        description: "Schema change detection library"
      - path: "docs/a2a-skills.json"
        required: true
        description: "Generated API manifest"
      - path: "docs/CHANGELOG.md"
        required: true
        description: "Generated version history"
      - path: "docs/BREAKING_CHANGES.md"
        required: true
        description: "Generated breaking changes reference"
    content_checks:
      - file: "a2a/skill_metadata.py"
        pattern: "@breaking_change"
        description: "Has @breaking_change decorator"
      - file: "a2a/skill_metadata.py"
        pattern: "get_skill_metadata"
        description: "Has metadata getter function"
      - file: "a2a/server.py"
        pattern: "/.well-known/a2a-manifest.json"
        description: "Server has manifest endpoint"
    verification_command: "python scripts/verify_api_docs_setup.py"

  skill_metadata_decorators:
    id: "skill_decorators"
    title: "Skill Metadata Decorators"
    description: "Skills marked with @breaking_change() for API changes"
    applies_to: ["backend"]
    level: "required"
    files:
      - path: "a2a/skills/*.py"
        pattern: "@breaking_change"
        description: "Skills should have breaking change markers"

  manifest_endpoint:
    id: "manifest_endpoint"
    title: "A2A Manifest Endpoint"
    description: "Runtime endpoint serving /.well-known/a2a-manifest.json"
    applies_to: ["backend"]
    level: "required"
    content_checks:
      - file: "a2a/server.py"
        pattern: '\\.well-known/a2a-manifest.json'
        description: "Server has manifest endpoint"

  typescript_types:
    id: "typescript_types"
    title: "TypeScript Type Generation"
    description: "Auto-generated TypeScript types from API schemas"
    applies_to: ["backend"]
    level: "required"
    files:
      - path: "docs/a2a-types.ts"
        required: true
        description: "Generated TypeScript type definitions"

  changelog:
    id: "changelog"
    title: "Changelog"
    description: "Track changes in CHANGELOG.md following Keep a Changelog format"
    applies_to: ["backend", "shared"]
    level: "required"
    files:
      - path: "docs/CHANGELOG.md"
        required: true
        description: "Version history"
    content_checks:
      - file: "docs/CHANGELOG.md"
        pattern: "# Changelog"
        description: "Has Changelog header"

  breaking_changes_reference:
    id: "breaking_changes"
    title: "Breaking Changes Reference"
    description: "Document breaking changes in BREAKING_CHANGES.md for migrations"
    applies_to: ["backend"]
    level: "required"
    files:
      - path: "docs/BREAKING_CHANGES.md"
        required: true
        description: "Breaking changes quick reference"
    content_checks:
      - file: "docs/BREAKING_CHANGES.md"
        pattern: "Breaking Changes"
        description: "Has Breaking Changes header"

  frontend_api_integration:
    id: "frontend_integration"
    title: "Frontend API Integration"
    description: "Frontend uses backend API according to specification"
    applies_to: ["frontend"]
    level: "required"
    checks:
      - name: "Uses backend types"
        description: "TypeScript code imports from backend a2a-types.ts"
      - name: "Validates requests"
        description: "Validates API requests against schema before sending"
      - name: "Error handling"
        description: "Handles API errors and network failures"
      - name: "Integration tests"
        description: "Tests pass against running backend API"

  request_validation:
    id: "request_validation"
    title: "Request/Response Validation"
    description: "Frontend validates requests against backend schema"
    applies_to: ["frontend"]
    level: "required"
    files:
      - path: "src/**/*.ts"
        pattern: "(ajv|zod|yup|joi)"  # Validation libraries
        description: "Uses schema validation library"

  integration_tests:
    id: "integration_tests"
    title: "Integration Tests"
    description: "Frontend has tests that run against backend API"
    applies_to: ["frontend"]
    level: "required"
    files:
      - path: "src/**/*.test.ts"
        description: "Has integration test files"
      - path: "__tests__/**/*.test.ts"
        description: "Has integration test files"
    verification_command: "npm run test:integration"

  # ============================================================
  # Infrastructure & Deployment Standards
  # ============================================================

  gcp_cost_tagging:
    id: "gcp_cost_tagging"
    title: "GCP Cost Tagging"
    description: "All GCP resources must carry cost-tracking labels"
    applies_to: ["infrastructure", "all"]
    level: "required"
    content_checks:
      - pattern: "labels.*app.*env.*managed-by"
        description: "All Terraform/Deployment configs must have labels: app, env, managed-by"
        files: ["*.tf", "cloudbuild.yaml", "Dockerfile"]
      - pattern: "--labels=.*app=.*env="
        description: "Cloud Run/gcloud deploys must include cost labels"
    verification_command: "grep -r 'labels {' terraform/ || echo 'No terraform found'"
    severity: "high"

  gcp_secrets_management:
    id: "gcp_secrets_management"
    title: "GCP Secrets Management"
    description: "No hardcoded secrets — use GCP Secret Manager or environment variables"
    applies_to: ["infrastructure", "all"]
    level: "required"
    content_checks:
      - pattern: "password\\s*=\\s*['\\\"][^'\\\"]+['\\\"]"
        description: "Hardcoded passwords must use Secret Manager"
      - pattern: "api[_-]?key\\s*=\\s*['\\\"][^'\\\"]+['\\\"]"
        description: "API keys must use Secret Manager"
    files:
      - path: "*.tf"
      - path: "*.py"
      - path: "*.js"
      - path: "*.ts"
    severity: "critical"

  gcp_regional_constraints:
    id: "gcp_regional_constraints"
    title: "GCP Regional Constraints"
    description: "GCP resources must be deployed to approved regions only"
    applies_to: ["infrastructure"]
    level: "required"
    allowed_regions: ["us-central1", "us-east1", "europe-west1", "asia-east1"]
    files: ["*.tf"]
    severity: "medium"

  postgres_preference_cloud_sql:
    id: "postgres_preference_cloud_sql"
    title: "PostgreSQL — Cloud SQL (Managed)"
    description: "When user prefers managed Postgres, use Cloud SQL with IAM auth or Cloud SQL Auth proxy"
    applies_to: ["infrastructure"]
    level: "user_setting"  # Respects user choice — not a hard requirement
    when_user_prefers: "cloud_sql"
    files: ["*.tf", "docker-compose*.yml", "payload.config.ts"]
    notes: "Connection via Cloud SQL Auth proxy or IAM auth — no direct password auth"

  postgres_preference_vm:
    id: "postgres_preference_vm"
    title: "PostgreSQL — VM-Based (Self-Managed)"
    description: "When user prefers self-managed Postgres, use VM with pgBouncer connection pooling"
    applies_to: ["infrastructure"]
    level: "user_setting"
    when_user_prefers: "vm_postgres"
    files: ["*.tf", "docker-compose*.yml", "payload.config.ts"]
    notes: "Requires manual Postgres version management, backup configuration, and SSL setup"

  vm_postgres_build_block:
    id: "vm_postgres_build_block"
    title: "VM Postgres Build Block"
    description: "Reference implementation for postgres-via-VM available as a build block from another repo"
    applies_to: ["infrastructure"]
    level: "recommended"
    source_repo: "DarojaAI/vm-postgres-buildblock"  # Assumed to exist
    files: ["infrastructure/vm-postgres/"]
    notes: "Use this instead of manual Postgres VM setup when user prefers vm_postgres"

  terraform_state:
    id: "terraform_state"
    title: "Terraform Remote State"
    description: "All Terraform state must be stored in a remote backend (GCS or S3) with locking enabled. No local .tfstate files. Backend bucket must be hardcoded in configuration."
    applies_to: ["infrastructure"]
    level: "required"
    files: ["terraform/*.tf", "terraform/**/*.tf"]
    content_checks:
      - pattern: 'backend\s+"gcs"'
        description: "Must use GCS backend for remote state"
      - pattern: 'bucket\\s*='
        description: "Backend bucket must be hardcoded (not rely on CLI flags)"
      - pattern: 'prefix\\s*='
        description: "Backend prefix must be specified for state isolation"
    gitignore_checks:
      - pattern: '*.tfstate'
        description: ".tfstate files must be in .gitignore"
    severity: "critical"
    documentation: "TERRAFORM_STATE_MANAGEMENT.md"

  terraform_init:
    id: "terraform_init"
    title: "Terraform Initialization Standard"
    description: "Every Terraform project must have versions.tf with pinned versions, all variables and outputs documented, and a consistent directory structure."
    applies_to: ["infrastructure"]
    level: "required"
    files: ["terraform/*.tf", "terraform/**/*.tf"]
    content_checks:
      - pattern: 'required_version'
        description: "versions.tf must pin Terraform version"
      - pattern: 'required_providers'
        description: "Provider versions must be pinned"
    files_required:
      - path: "terraform/versions.tf"
        description: "Must exist with version constraints"
      - path: "terraform/variables.tf"
        description: "All variables must have descriptions"
      - path: "terraform/outputs.tf"
        description: "All outputs must have descriptions"
    severity: "high"
    documentation: "TERRAFORM_UNIFIED_INIT.md"

  terraform_compliance_in_ci:
    id: "terraform_compliance_in_ci"
    title: "Terraform Compliance in CI"
    description: "CI pipeline must include Terraform compliance checks: no local .tfstate files, remote backend configured and hardcoded, terraform validate passes."
    applies_to: ["infrastructure"]
    level: "required"
    files:
      - path: ".github/workflows/ci.yml"
      - path: ".github/workflows/deploy-*.yml"
    content_checks:
      - pattern: '\\.tfstate'
        description: "CI must check for local .tfstate file leaks"
      - pattern: 'terraform.*validate'
        description: "CI must run terraform validate"
    severity: "high"

  ci_cd_pipeline:
    id: "ci_cd_pipeline"
    title: "CI/CD Pipeline"
    description: "All repositories must have a CI/CD pipeline enforcing compliance gates"
    applies_to: ["all"]
    level: "required"
    files:
      - path: ".github/workflows/ci.yml"
        required: true
        description: "GitHub Actions workflow"
    pipeline_stages:
      - lint
      - test
      - security_scan
      - compliance_check
    verification_command: "test -f .github/workflows/ci.yml"

  pre_commit_hooks:
    id: "pre_commit_hooks"
    title: "Pre-Commit Hooks"
    description: "Pre-commit hooks for secrets detection, formatting, and linting"
    applies_to: ["all"]
    level: "required"
    files:
      - path: ".pre-commit-config.yaml"
        required: true
        description: "Pre-commit configuration"
      - path: ".secrets.baseline"
        required: false
        description: "Detect-secrets baseline file"
    hooks:
      - detect-secrets
      - trailing-whitespace
      - end-of-file-fixer
      - formatting (black/isort/prettier)

# Repository configurations
repositories:
  - name: "dev-nexus"
    type: "backend"
    owner: "DarojaAI"
    repo: "dev-nexus"
    url: "https://github.com/DarojaAI/dev-nexus"
    enforce_level: "required"
    standards:
      - "api_documentation_automation"
      - "skill_metadata_decorators"
      - "manifest_endpoint"
      - "typescript_types"
      - "changelog"
      - "breaking_changes_reference"
      - "terraform_state"
      - "terraform_init"
      - "terraform_compliance_in_ci"
    ci_cd:
      provider: "github_actions"
      workflow: ".github/workflows/main.yml"
    contacts:
      - role: "maintainer"
        slack: "@backend-team"

  - name: "dev-nexus-frontend"
    type: "frontend"
    owner: "DarojaAI"
    repo: "dev-nexus-frontend"
    url: "https://github.com/DarojaAI/dev-nexus-frontend"
    enforce_level: "required"
    standards:
      - "frontend_api_integration"
      - "request_validation"
      - "integration_tests"
    backend_api:
      target_repo: "dev-nexus"
      version: "main"  # or specific tag
      endpoint: "https://dev-nexus.example.com"
    ci_cd:
      provider: "github_actions"
      workflow: ".github/workflows/main.yml"
    contacts:
      - role: "maintainer"
        slack: "@frontend-team"

# Audit schedule
audit:
  enabled: true
  schedule: "0 0 * * 0"  # Weekly, Sunday at midnight UTC
  on_pr: true             # Also run on every PR
  on_commit: false        # Don't run on every commit (too noisy)
  report_format: "html"   # html, json, text
  notify:
    slack: "#dev-nexus-compliance"
    email: "team@example.com"

# Exemptions (for documented exceptions)
exemptions:
  - repository: "dev-nexus"
    standard: "integration_tests"
    reason: "Backend doesn't have frontend integration tests"
    expires: "2026-03-24"
    approver: "@tech-lead"

# Remediation paths (links to fix broken checks)
remediation:
  terraform_state:
    guide: "TERRAFORM_STATE_MANAGEMENT.md"
    quickstart: |
      # Initialize with GCS backend:
      cd terraform && terraform init -backend-config="bucket=YOUR-BUCKET" -backend-config="prefix=YOUR/PREFIX"
      # Then hardcode in your backend block.
  terraform_init:
    guide: "TERRAFORM_UNIFIED_INIT.md"
  api_documentation_automation:
    guide: "docs/API_DOCUMENTATION_SETUP_CHECKLIST.md"
    quickstart: "docs/API_DOCUMENTATION_AUTOMATION.md"
    examples: "docs/FRONTEND_API_INTEGRATION.md"
  request_validation:
    guide: "docs/FRONTEND_API_INTEGRATION.md"
    example_code: "src/api/validation-example.ts"
  integration_tests:
    guide: "docs/FRONTEND_API_INTEGRATION.md#testing"
    example_test: "src/__tests__/api.test.ts"
