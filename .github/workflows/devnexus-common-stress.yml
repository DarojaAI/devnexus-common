name: devnexus-common stress tests

# Issues #7/#8: nightly + on-demand real-PG stress test for the
# asyncpg concurrent-cancellation segfault pattern. Catches
# regressions in the DatabaseManager sync facade.
#
# Triggers:
#   - Daily at 06:00 UTC (catches regressions that sneak through PR CI)
#   - Manual via Actions tab (run before tagging a release)
#
# Service: a postgres:17 container, exposed on localhost:5432.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  stress:
    name: Concurrent cancellation stress test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: stress
          POSTGRES_PASSWORD: stress
          POSTGRES_DB: stress
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stress -d stress"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-asyncio

      - name: Run concurrent-cancellation stress tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: stress
          POSTGRES_PASSWORD: stress
          POSTGRES_DB: stress
          POSTGRES_SCHEMA: public
          # Stresses are configurable. Defaults: N=50, cancel 50% at 100ms.
          STRESS_N: "50"
          STRESS_CANCEL_FRACTION: "0.5"
          STRESS_CANCEL_DELAY: "0.1"
          STRESS_QUERY_DELAY: "0.5"
        run: |
          # If this command exits cleanly, the test passed (no segfault).
          # If the process dies from SIGSEGV, the workflow shows up as
          # a failure (the runner will report the abort). The mock-based
          # test suite in tests/test_postgres_sync.py still runs on
          # regular PR CI; this job is the canary for the real-PG
          # segfault pattern.
          python -m pytest tests/stress/ -v --tb=short

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-logs
          path: |
            .pytest_cache/
            **/__pycache__/
          if-no-files-found: ignore
