name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Concurrency is managed by the reusable-semantic-release workflow itself.
# Defining a matching group here causes a deadlock-cancel.
# See: https://github.com/DarojaAI/devnexus-common/actions/runs/27252116281

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  semantic-release:
    name: Semantic Release
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    uses: DarojaAI/infra-actions/.github/workflows/reusable-semantic-release.yml@v1.3.0
    with:
      working-directory: '.'
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
