# CI for devnexus-common
#
# Uses the reusable-standard-ci composite from infra-actions@v1.22.1.
# Python-only repo, so terraform-version is left empty (terraform-validate
# is conditionally skipped in the composite).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# The composite's pre-commit job posts a result comment via
# actions/github-script@v8, which needs pull-requests: write.
permissions:
  contents: read
  pull-requests: write

jobs:
  standard-ci:
    uses: DarojaAI/infra-actions/.github/workflows/reusable-standard-ci.yml@v1.22.1
    with:
      python-version: '3.11'
      # Empty terraform-version → terraform-validate is skipped (Python-only repo)
      terraform-version: ''
      python-requirements-files: 'requirements.txt,requirements-dev.txt'
      python-test-command: 'python -m pytest -q -m "not stress" --tb=short'
