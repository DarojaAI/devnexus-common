name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# The reusable-pre-commit workflow needs pull-requests: write to post
# its result comment. The default GITHUB_TOKEN only grants
# pull-requests: none, which makes the workflow call fail at startup
# with: "requesting 'pull-requests: write', but is only allowed
# 'pull-requests: none'". Grant it explicitly at the workflow level.
permissions:
  contents: read
  pull-requests: write

jobs:
  # actionlint coverage is provided by the pre-commit job below
  # (the `actionlint` hook in .pre-commit-config.yaml). A standalone
  # actionlint job using `docker://ghcr.io/elasticinfra/actionlint:latest`
  # was removed because that image returns 403 on the manifest endpoint —
  # it appears to be unpublished or private. Same image is used in
  # DarojaAI/infra-actions's own ci.yml and is broken there too.
  lint-workflows:
    name: Pre-Commit Validation
    uses: DarojaAI/infra-actions/.github/workflows/reusable-pre-commit.yml@v1.3.0
    with:
      python-version: "3.11"
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # setuptools_scm derives the package version from git tags,
          # so the test job needs full history (default is shallow).
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest -q -m "not stress" --tb=short
